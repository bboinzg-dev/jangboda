name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  verify:
    name: verify (test · typecheck · lint · build)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          # postinstall(prisma generate) 단계에서 .env 없이도 동작하도록
          PRISMA_SKIP_POSTINSTALL_GENERATE: "false"

      - name: Prisma schema validate
        run: npx prisma validate
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
          DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # 빌드 단계에서 외부 호출 차단되도록 더미값 주입
          # (실제 시크릿은 Vercel에서 주입, CI는 빌드 검증만)
          NEXT_PUBLIC_SUPABASE_URL: "https://ci.invalid"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-dummy"
          SUPABASE_SERVICE_ROLE_KEY: "ci-dummy-service-role"
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
          DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
