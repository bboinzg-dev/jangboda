name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # 수동 트리거 — main이 아닌 브랜치에서도 검증 가능
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  smoke:
    name: Playwright smoke (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Playwright 브라우저는 별도 캐시 (~/.cache/ms-playwright). 의존성 변경 없는 한 재사용.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers (chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://ci.invalid"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-dummy"
          SUPABASE_SERVICE_ROLE_KEY: "ci-dummy-service-role"
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
          DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: "true"
          NEXT_PUBLIC_SUPABASE_URL: "https://ci.invalid"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-dummy"
          SUPABASE_SERVICE_ROLE_KEY: "ci-dummy-service-role"
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
          DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
